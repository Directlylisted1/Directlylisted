# Render Blueprint for the Directly Listed platform.
# Deploy: push to a Git repo, then in Render → New → Blueprint, point at this file.
#
# Database: a Render-managed PostgreSQL instance (below). The build runs
# scripts/use-postgres.mjs to switch the Prisma datasource to postgresql for the
# deployed app only — local development stays on SQLite, unchanged.
databases:
  - name: directlylisted-db
    databaseName: directlylisted
    user: directlylisted
    plan: free # 90-day free Postgres; switch to a paid plan (e.g. basic-256mb) for production

services:
  - type: web
    name: directlylisted
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm ci && node scripts/use-postgres.mjs && npx prisma generate && npm run build
    # Create/update tables, then seed offerings, blog posts, and CRM availability
    # (all idempotent upserts — safe to run on every deploy). preDeploy runs once
    # before traffic shifts; scripts/start.mjs repeats it on every boot as a
    # safety net so a missed Blueprint sync can't leave the DB empty again.
    preDeployCommand: npx prisma db push && npm run db:seed:all
    startCommand: node scripts/start.mjs
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22.11.0"
      - key: NODE_ENV
        value: production
      # Connection string injected from the managed Postgres database above.
      - key: DATABASE_URL
        fromDatabase:
          name: directlylisted-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: CARD_PAYMENT_LIMIT_USD
        value: "5000"
      - key: BRAINTREE_ENVIRONMENT
        value: sandbox
      - key: BRAINTREE_MERCHANT_ID
        sync: false
      - key: BRAINTREE_PUBLIC_KEY
        sync: false
      - key: BRAINTREE_PRIVATE_KEY
        sync: false
      - key: ADOBE_SIGN_BASE_URL
        value: https://api.na1.adobesign.com
      - key: ADOBE_SIGN_INTEGRATION_KEY
        sync: false
      # Fallback token for the blog publishing API (/api/blog/ingest). Normally
      # generated + managed from the admin back office; this is an optional
      # override. Used by external SEO tools (e.g. RankChat) to auto-post.
      - key: BLOG_API_TOKEN
        sync: false
      # WordPress-compatible API (RankChat WordPress connector). Normally
      # generated + managed from the admin back office; optional env override.
      - key: WP_API_USERNAME
        sync: false
      - key: WP_API_APP_PASSWORD
        sync: false
      # Email notifications for website inquiries (SMTP).
      # These are FALLBACKS — an admin can also connect the mailbox from
      # /admin/integrations (stored in the DB), which takes precedence.
      # Primary + second inbox: every platform message is delivered to both.
      - key: NOTIFY_EMAIL
        value: info@directlylisted.com
      - key: NOTIFY_EMAIL_2
        value: support@directlylisted.com
      # From must match the authenticated mailbox or Microsoft 365 rejects the send.
      - key: MAIL_FROM
        value: Directly Listed <info@directlylisted.com>
      # GoDaddy / Microsoft 365: host smtp.office365.com, port 587, secure false
      # (STARTTLS), user = full email address. Set the secrets in the dashboard.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
    # Persistent disk for issuer-uploaded campaign media (public/uploads).
    disk:
      name: uploads
      mountPath: /opt/render/project/src/public/uploads
      sizeGB: 1
